spring:
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
    bus:
      enabled: false
    discovery:
      enabled: false
  config:
    import: ""
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.cloud.bus.BusAutoConfiguration

eureka:
  client:
    enabled: false
