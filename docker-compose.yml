# Local development stack — infra only (Phase 1).
# Business services are added to this file in Phase 2+.
# Defaults here are dev-friendly; override via .env for anything real.
# See .env.example for the full list of variables.

name: microservices-lab

services:
  postgres:
    image: postgres:18.3-alpine
    container_name: ms-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
      # Passed through to the init script (see docker/postgres/init/).
      USERDB_PASSWORD: ${USERDB_PASSWORD:-userdb_pass}
      PRODUCTDB_PASSWORD: ${PRODUCTDB_PASSWORD:-productdb_pass}
      ORDERDB_PASSWORD: ${ORDERDB_PASSWORD:-orderdb_pass}
      NOTIFICATIONDB_PASSWORD: ${NOTIFICATIONDB_PASSWORD:-notificationdb_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - platform

  redis:
    image: redis:8.2-alpine
    container_name: ms-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - platform

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: ms-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - platform

  zipkin:
    image: openzipkin/zipkin:3
    container_name: ms-zipkin
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9411/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: ms-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_LISTEN_PORT: "80"
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - platform

networks:
  platform:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  pgadmin-data: