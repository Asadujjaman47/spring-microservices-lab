server:
  port: 8084

spring:
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5432/notificationdb}
    username: ${NOTIFICATION_DB_USERNAME:notificationdb_user}
    password: ${NOTIFICATION_DB_PASSWORD:notificationdb_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  # Listener retry: 3 attempts with exponential backoff (1s, 2s, 4s). After the last attempt fails,
  # the container rejects with requeue=false and the message is routed to the DLQ via the
  # x-dead-letter-exchange set on the main queue (see notification.config.RabbitConfig).
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1s
          multiplier: 2.0
          max-attempts: 3
          max-interval: 10s