server:
  port: 8083

spring:
  datasource:
    url: ${ORDER_DB_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${ORDER_DB_USERNAME:orderdb_user}
    password: ${ORDER_DB_PASSWORD:orderdb_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Resilience4j circuit breaker around the product-service stock call. Sliding window of 10 calls;
# once >= 50% fail, opens for 10s (fast-fails + hits fallback), then half-opens for 3 probe calls.
resilience4j:
  circuitbreaker:
    instances:
      productService:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        # BusinessException is a domain error (e.g. OUT_OF_STOCK) and must not trip the breaker.
        ignore-exceptions:
          - com.learning.microservice.common.error.BusinessException

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh,env,metrics,circuitbreakers,circuitbreakerevents
  health:
    circuitbreakers:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs