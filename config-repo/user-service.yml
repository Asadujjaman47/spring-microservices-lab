server:
  port: 8081

spring:
  datasource:
    url: ${USER_DB_URL:jdbc:postgresql://localhost:5432/userdb}
    username: ${USER_DB_USERNAME:userdb_user}
    password: ${USER_DB_PASSWORD:userdb_pass}
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns schema; JPA just validates mappings against it.
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

---
# Seed demo data only in local + docker. In prod, Flyway won't see db/seed/.
spring:
  config:
    activate:
      on-profile: local | docker
  flyway:
    locations: classpath:db/migration,classpath:db/seed

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Defence-in-depth: user-service also parses the shared JWT so controllers can trust
# request attributes populated by common-lib's JwtAuthenticationFilter.
common:
  jwt:
    enabled: true

user:
  auth:
    # JWT lifetime after issuance. 60 minutes is a learning default — production would
    # pair this with refresh tokens.
    token-ttl-minutes: ${USER_AUTH_TOKEN_TTL_MINUTES:60}

# Demo property — refreshed at runtime via /actuator/busrefresh,
# consumed by the @RefreshScope greeting endpoint.
demo:
  greeting: "Hello from config-service (default)"
