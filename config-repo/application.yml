management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh,env,metrics
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

# Shared HMAC JWT config — services opt-in with common.jwt.enabled=true (decision #5).
common:
  jwt:
    enabled: false
    secret: ${JWT_SECRET:change-me-to-a-long-random-string-at-least-256-bits}

logging:
  level:
    root: INFO
