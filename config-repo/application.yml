management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh,env,metrics
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true
  # Decision #7 — Micrometer Tracing (Brave) → Zipkin. Sample everything in dev;
  # prod profile drops the ratio to 10%.
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

# Shared HMAC JWT config — services opt-in with common.jwt.enabled=true (decision #5).
common:
  jwt:
    enabled: false
    secret: ${JWT_SECRET:change-me-to-a-long-random-string-at-least-256-bits}

logging:
  level:
    root: INFO

---
# Decision #34 — production tightens actuator surface and trace sampling.
spring:
  config:
    activate:
      on-profile: prod

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 0.1
