server:
  port: 8082

spring:
  datasource:
    url: ${PRODUCT_DB_URL:jdbc:postgresql://localhost:5432/productdb}
    username: ${PRODUCT_DB_USERNAME:productdb_user}
    password: ${PRODUCT_DB_PASSWORD:productdb_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

---
# Seed demo data only in local + docker. In prod, Flyway won't see db/seed/.
spring:
  config:
    activate:
      on-profile: local | docker
  flyway:
    locations: classpath:db/migration,classpath:db/seed
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 5m           # 5-minute TTL on cached product lookups
      use-key-prefix: true
      cache-null-values: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
