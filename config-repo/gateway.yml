server:
  port: 8080

# Gateway enforces JWT; common.jwt.secret comes from shared application.yml.
common:
  jwt:
    enabled: true

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**,/api/v1/auth/**
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/v1/products/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**
            # OpenAPI doc routes — rewrite /v3/api-docs/{service} → {service}/v3/api-docs
            # so the aggregated Swagger UI (below) can fetch each service's spec through
            # the gateway's own port.
            - id: user-service-openapi
              uri: lb://user-service
              predicates:
                - Path=/v3/api-docs/user-service
              filters:
                - SetPath=/v3/api-docs
            - id: product-service-openapi
              uri: lb://product-service
              predicates:
                - Path=/v3/api-docs/product-service
              filters:
                - SetPath=/v3/api-docs
            - id: order-service-openapi
              uri: lb://order-service
              predicates:
                - Path=/v3/api-docs/order-service
              filters:
                - SetPath=/v3/api-docs

# Aggregated Swagger UI at http://localhost:8080/swagger-ui.html — each URL below is
# served via the OpenAPI rewrite routes above. `api-docs` must stay enabled because
# the UI bootstraps by fetching `/v3/api-docs/swagger-config`; disabling the whole
# `api-docs` module takes that endpoint offline and the UI fails with 500.
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: user-service
        url: /v3/api-docs/user-service
      - name: product-service
        url: /v3/api-docs/product-service
      - name: order-service
        url: /v3/api-docs/order-service
